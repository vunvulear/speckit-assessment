name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests with coverage
        run: pytest --cov=cloudlatency --cov-fail-under=90 --cov-report=term-missing

      - name: Check cyclomatic complexity
        run: |
          radon cc src/cloudlatency/ -a -nc
          # Fail if any function has complexity grade C or worse
          if radon cc src/cloudlatency/ -a -nc | grep -E "^\s+[C-F]"; then
            echo "ERROR: Functions with cyclomatic complexity > 5 detected"
            exit 1
          fi
